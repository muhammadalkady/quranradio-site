<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quran Radio</title>
  <meta name="description" content="Quran Radio — listen to the Holy Quran online." />
  <meta name="theme-color" content="#1A2520" />
  <style>
    /* App fonts, self-hosted from the app's own font files */
    @font-face { font-family: "Lobster"; src: url("fonts/lobster_regular.ttf") format("truetype"); font-weight: 400; font-display: swap; }
    @font-face { font-family: "Marcellus"; src: url("fonts/marcellus_regular.ttf") format("truetype"); font-weight: 400; font-display: swap; }
    @font-face { font-family: "Amiri"; src: url("fonts/amiri_regular.ttf") format("truetype"); font-weight: 400; font-display: swap; }
    @font-face { font-family: "Amiri"; src: url("fonts/amiri_bold.ttf") format("truetype"); font-weight: 700; font-display: swap; }
    @font-face { font-family: "Reem Kufi"; src: url("fonts/reem_kufi_regular.ttf") format("truetype"); font-weight: 400 600; font-display: swap; }
    :root {
      /* Colors taken from the app's dark theme */
      --bg: #1A2520;          /* backgroundDark / surfaceDark */
      --fg: #D7E8DC;          /* onBackgroundDark */
      --primary: #A8C9B2;     /* primaryDark (sage) */
      --accent: #7FE03C;      /* Quran green — brand / logo */
      /* Fonts matching the app */
      --font-display: "Lobster", cursive;
      --font-en: "Marcellus", Georgia, serif;
      --font-ar: "Amiri", serif;
      --font-ar-display: "Reem Kufi", sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-en);
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 1.5rem;
    }
    .logo {
      width: clamp(96px, 22vw, 150px);
      height: auto;
      margin-bottom: 1.25rem;
      filter: drop-shadow(0 0 28px rgba(127, 224, 60, 0.25));
    }
    .arabic {
      font-family: var(--font-ar-display);
      font-size: clamp(1.5rem, 5vw, 2.4rem);
      margin-bottom: 0.35rem;
      color: var(--primary);
    }
    h1 {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: clamp(2.4rem, 7vw, 4rem);
      letter-spacing: 0.01em;
      color: var(--accent);
    }
    p { margin-top: 1rem; opacity: 0.8; max-width: 34ch; line-height: 1.6; }
    footer { margin-top: 2.5rem; font-size: 0.85rem; opacity: 0.5; }
    footer a { color: var(--primary); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
